<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a154b"/>
      <stop offset="100%" stop-color="#1a0520"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d68a"/>
      <stop offset="40%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8912e"/>
    </linearGradient>
    <linearGradient id="goldV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f0d68a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8912e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#f0d68a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f0d68a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="496" height="496" rx="90" ry="90" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="90" ry="90" fill="none" stroke="url(#gold)" stroke-width="6"/>
  <rect x="20" y="20" width="472" height="472" rx="82" ry="82" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.3"/>

  <!-- Center glow -->
  <rect x="8" y="8" width="496" height="496" rx="90" ry="90" fill="url(#glow)"/>

  <!-- Main cross -->
  <g filter="url(#softGlow)">
    <!-- Vertical beam -->
    <rect x="230" y="90" width="52" height="260" rx="4" fill="url(#goldV)"/>
    <!-- Horizontal beam -->
    <rect x="130" y="175" width="252" height="44" rx="4" fill="url(#gold)"/>

    <!-- Highlight edges -->
    <rect x="233" y="93" width="6" height="254" rx="2" fill="#f0d68a" opacity="0.5"/>
    <rect x="133" y="178" width="246" height="6" rx="2" fill="#f0d68a" opacity="0.4"/>

    <!-- Shadow edges -->
    <rect x="273" y="93" width="5" height="254" rx="2" fill="#7a5a10" opacity="0.3"/>
    <rect x="133" y="213" width="246" height="4" rx="2" fill="#7a5a10" opacity="0.3"/>

    <!-- Center jewel -->
    <polygon points="256,177 276,197 256,217 236,197" fill="#f0d68a"/>
    <polygon points="256,182 271,197 256,212 241,197" fill="url(#gold)"/>
    <circle cx="256" cy="197" r="4" fill="#fff" opacity="0.5"/>
  </g>

  <!-- Small decorative dots at cross ends -->
  <circle cx="256" cy="92" r="3.5" fill="#f0d68a" opacity="0.8"/>
  <circle cx="256" cy="348" r="3.5" fill="#f0d68a" opacity="0.8"/>
  <circle cx="132" cy="197" r="3.5" fill="#f0d68a" opacity="0.8"/>
  <circle cx="380" cy="197" r="3.5" fill="#f0d68a" opacity="0.8"/>
</svg>